<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Identity Monitor Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #00ff88;
            --accent-bedrock: #00d2ff;
            --text: #e0e0e0;
            --text-dim: #888;
            --danger: #ff4757;
            --border: #333;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* コンテナ設計 */
        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 24px;
        }

        h1 {
            font-size: 22px;
            margin: 0 0 24px 0;
            text-align: center;
            letter-spacing: 2px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* 検索セクション */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px 45px 16px 16px;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 255, 136, 0.2);
        }

        .search-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .search-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .search-btn:active { transform: translateY(0); }

        /* 結果表示エリア */
        #result-area { display: none; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .player-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .face-preview {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            background: #333;
            image-rendering: pixelated;
            border: 2px solid var(--border);
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: inline-block;
        }

        .badge-java { background: var(--accent); color: #000; }
        .badge-bedrock { background: var(--accent-bedrock); color: #000; }

        .info-row {
            margin-bottom: 15px;
        }

        .info-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        
        .clickable-value {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .clickable-value:hover { border-color: var(--accent); background: #111; }
        .clickable-value i { color: var(--text-dim); font-size: 12px; }

        /* 履歴・アラート */
        .history-section {
            background: #000;
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
        }

        .history-tag {
            display: inline-block;
            background: #222;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 8px;
            color: var(--accent-bedrock);
        }

        .alert-banner {
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 全体ログ表示 */
        .global-logs {
            width: 100%;
            max-width: 500px;
        }

        .log-card {
            background: #111;
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        /* トースト通知 */
        #toast {
            position: fixed;
            top: 20px;
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="toast">Copied to clipboard!</div>

<div class="container">
    <div class="card">
        <h1><i class="fa-solid fa-shield-halved"></i> ID MONITOR PRO</h1>
        
        <div class="search-box">
            <input type="text" id="mcid" placeholder="Username (Prefix . for Bedrock)" onkeypress="if(event.key==='Enter') search()">
        </div>
        <button class="search-btn" onclick="search()" id="search-btn">
            <i class="fa-solid fa-magnifying-glass"></i> CHECK IDENTITY
        </button>

        <div id="result-area">
            <div id="alert-container"></div>

            <div class="player-header">
                <img id="face-img" src="" class="face-preview" alt="Face">
                <div>
                    <div id="type-badge" class="badge"></div>
                    <div id="display-name" style="font-size: 20px; font-weight: bold;"></div>
                </div>
            </div>

            <div class="info-row">
                <div class="info-label">Current Identifier</div>
                <div class="clickable-value" onclick="copy(this.innerText)">
                    <span id="res-id"></span>
                    <i class="fa-regular fa-copy"></i>
                </div>
            </div>

            <div class="history-section">
                <div class="info-label" style="margin-bottom: 10px;">Name History</div>
                <div id="res-history"></div>
            </div>
        </div>
    </div>

    <div class="global-logs">
        <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">
            <i class="fa-solid fa-list-ul"></i> Global Change Logs
        </div>
        <div id="global-log-container">
            </div>
    </div>
</div>

<script>
    // WorkerのURLをここに
    const API_BASE = "https://your-worker-url.workers.dev";

    async function search() {
        const mcid = document.getElementById('mcid').value.trim();
        const btn = document.getElementById('search-btn');
        if(!mcid) return;

        // UI Loading State
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> ANALYZING...';
        
        try {
            const res = await fetch(`${API_BASE}?mcid=${encodeURIComponent(mcid)}`);
            const data = await res.json();

            if(data.error) throw new Error(data.error);

            // 表示処理
            document.getElementById('result-area').style.display = "block";
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('res-id').innerText = data.id;
            
            // バッジ & 顔画像
            const badge = document.getElementById('type-badge');
            const face = document.getElementById('face-img');
            if(data.type === "Bedrock") {
                badge.innerText = "Bedrock Edition";
                badge.className = "badge badge-bedrock";
                // 統合版はSteveを表示（またはXUID対応APIがあれば差し替え）
                face.src = `https://mc-heads.net/avatar/steve/64`;
            } else {
                badge.innerText = "Java Edition";
                badge.className = "badge badge-java";
                face.src = `https://mc-heads.net/avatar/${data.id}/64`;
            }

            // 改名アラート
            const alertCont = document.getElementById('alert-container');
            if(data.changeLog) {
                alertCont.innerHTML = `<div class="alert-banner"><i class="fa-solid fa-triangle-exclamation"></i> ${data.changeLog}</div>`;
            } else {
                alertCont.innerHTML = "";
            }

            // 履歴タグ
            const histCont = document.getElementById('res-history');
            histCont.innerHTML = data.history.map(h => `<span class="history-tag">${h}</span>`).join('');

            // 全体ログの更新（もしWorkerが全体ログを返せるならここで）
            updateGlobalLogs();

        } catch (e) {
            alert("Player not found in database.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> CHECK IDENTITY';
        }
    }

    // 全体ログ取得（ダミー実装：Workerに ?action=get_logs エンドポイントがある前提）
    async function updateGlobalLogs() {
        try {
            const res = await fetch(`${API_BASE}?action=get_logs`);
            const logs = await res.json();
            const container = document.getElementById('global-log-container');
            container.innerHTML = logs.map(l => `
                <div class="log-card">
                    <span>${l.msg}</span>
                    <span style="color:#555;">${l.time}</span>
                </div>
            `).join('');
        } catch(e) {
            console.log("No global logs available yet.");
        }
    }

    function copy(text) {
        // 装飾（&bなど）を取り除いてコピーするか、そのままにするか選べますが、
        // ここではIfutoさんの「コピーして使う」用途に合わせてそのままコピーします。
        navigator.clipboard.writeText(text);
        const toast = document.getElementById('toast');
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 2000);
    }

    // ページ読み込み時に全体ログを表示
    updateGlobalLogs();
</script>

</body>
</html>
